<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow Monitor · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ── Shared tokens ── */
  :root {
    --font-body: 'Instrument Sans', system-ui, sans-serif;
    --font-mono: 'DM Mono', 'Menlo', monospace;
    --r-sm: 8px;
    --r-md: 12px;
    --r-lg: 16px;
    --r-xl: 20px;
    --accent: #3d8bfd;
    --accent-dim: rgba(61,139,253,0.10);
    --accent-mid: rgba(61,139,253,0.22);
    --accent-glow: rgba(61,139,253,0.35);
    --gold: #f0b940;
    --gold-dim: rgba(240,185,64,0.10);
  }

  /* ── Dark theme (default) ── */
  :root, [data-theme="dark"] {
    --bg-0: #06080d;
    --bg-1: #0b0f18;
    --bg-2: #101624;
    --bg-3: #161e30;
    --bg-glass: rgba(16,22,36,0.72);
    --bg-glass-hover: rgba(22,30,48,0.82);
    --border-0: rgba(255,255,255,0.04);
    --border-1: rgba(255,255,255,0.07);
    --border-2: rgba(255,255,255,0.12);
    --text-0: #f1f5f9;
    --text-1: #c1cad8;
    --text-2: #7b8ba4;
    --text-3: #3e4d65;
    --bull: #2dd4a8;
    --bull-dim: rgba(45,212,168,0.08);
    --bull-mid: rgba(45,212,168,0.18);
    --bear: #f06060;
    --bear-dim: rgba(240,96,96,0.08);
    --bear-mid: rgba(240,96,96,0.18);
    --shadow-card: 0 1px 3px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.25);
    --shadow-glow: 0 0 40px rgba(61,139,253,0.08);
    --ambient-1: rgba(61,139,253,0.04);
    --ambient-2: rgba(45,212,168,0.025);
    --noise-opacity: 0.025;
    --logo-shadow: 0 2px 10px rgba(61,139,253,0.25);
    --logo-shadow-lg: 0 4px 16px rgba(61,139,253,0.3);
    --skeleton-a: var(--bg-3);
    --skeleton-b: var(--bg-2);
  }

  /* ── Light theme ── */
  [data-theme="light"] {
    --bg-0: #f4f6f9;
    --bg-1: #eaecf1;
    --bg-2: #ffffff;
    --bg-3: #e2e6ed;
    --bg-glass: rgba(255,255,255,0.72);
    --bg-glass-hover: rgba(255,255,255,0.85);
    --border-0: rgba(0,0,0,0.04);
    --border-1: rgba(0,0,0,0.08);
    --border-2: rgba(0,0,0,0.14);
    --text-0: #1a1f2e;
    --text-1: #3b4459;
    --text-2: #6b7a94;
    --text-3: #9aa5b8;
    --bull: #0fa87e;
    --bull-dim: rgba(15,168,126,0.08);
    --bull-mid: rgba(15,168,126,0.18);
    --bear: #dc4444;
    --bear-dim: rgba(220,68,68,0.07);
    --bear-mid: rgba(220,68,68,0.16);
    --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 6px 20px rgba(0,0,0,0.06);
    --shadow-glow: 0 0 40px rgba(61,139,253,0.04);
    --ambient-1: rgba(61,139,253,0.03);
    --ambient-2: rgba(15,168,126,0.02);
    --noise-opacity: 0.015;
    --logo-shadow: 0 2px 10px rgba(61,139,253,0.18);
    --logo-shadow-lg: 0 4px 16px rgba(61,139,253,0.22);
    --skeleton-a: #e2e6ed;
    --skeleton-b: #eef0f4;
  }

  /* ── Auto: follow OS preference ── */
  @media (prefers-color-scheme: light) {
    [data-theme="auto"] {
      --bg-0: #f4f6f9;
      --bg-1: #eaecf1;
      --bg-2: #ffffff;
      --bg-3: #e2e6ed;
      --bg-glass: rgba(255,255,255,0.72);
      --bg-glass-hover: rgba(255,255,255,0.85);
      --border-0: rgba(0,0,0,0.04);
      --border-1: rgba(0,0,0,0.08);
      --border-2: rgba(0,0,0,0.14);
      --text-0: #1a1f2e;
      --text-1: #3b4459;
      --text-2: #6b7a94;
      --text-3: #9aa5b8;
      --bull: #0fa87e;
      --bull-dim: rgba(15,168,126,0.08);
      --bull-mid: rgba(15,168,126,0.18);
      --bear: #dc4444;
      --bear-dim: rgba(220,68,68,0.07);
      --bear-mid: rgba(220,68,68,0.16);
      --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 6px 20px rgba(0,0,0,0.06);
      --shadow-glow: 0 0 40px rgba(61,139,253,0.04);
      --ambient-1: rgba(61,139,253,0.03);
      --ambient-2: rgba(15,168,126,0.02);
      --noise-opacity: 0.015;
      --logo-shadow: 0 2px 10px rgba(61,139,253,0.18);
      --logo-shadow-lg: 0 4px 16px rgba(61,139,253,0.22);
      --skeleton-a: #e2e6ed;
      --skeleton-b: #eef0f4;
    }
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-0);
    color: var(--text-0);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Ambient background ── */
  body::before {
    content: '';
    position: fixed;
    top: -40%; left: -20%;
    width: 80%; height: 80%;
    background: radial-gradient(ellipse, var(--ambient-1) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30%; right: -10%;
    width: 60%; height: 70%;
    background: radial-gradient(ellipse, var(--ambient-2) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Noise overlay */
  .noise {
    position: fixed; inset: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    opacity: var(--noise-opacity, 0.025);
    pointer-events: none; z-index: 0;
  }

  .app {
    position: relative; z-index: 1;
    max-width: 1440px;
    margin: 0 auto;
    padding: 20px 24px;
  }

  /* ═══════════════════════════════════════════════════════════
     LOGIN
     ═══════════════════════════════════════════════════════════ */
  .login-wrap {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    position: relative; z-index: 1;
  }
  .login-backdrop {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 40%, rgba(61,139,253,0.06) 0%, transparent 100%),
      radial-gradient(ellipse 40% 40% at 70% 70%, rgba(45,212,168,0.04) 0%, transparent 100%);
    pointer-events: none;
  }
  .login-box {
    position: relative;
    background: var(--bg-glass);
    backdrop-filter: blur(40px) saturate(1.4);
    -webkit-backdrop-filter: blur(40px) saturate(1.4);
    border: 1px solid var(--border-1);
    border-radius: var(--r-xl);
    padding: 48px 40px;
    max-width: 420px; width: 100%;
    box-shadow: var(--shadow-card), var(--shadow-glow);
    animation: loginEntry 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes loginEntry {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .login-brand {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    margin-bottom: 32px;
  }
  .login-logomark {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), #6c5ce7);
    border-radius: var(--r-md);
    display: flex; align-items: center; justify-content: center;
    font-weight: 500; font-size: 15px; color: #fff;
    font-family: var(--font-mono);
    letter-spacing: -0.02em;
    box-shadow: var(--logo-shadow-lg);
  }
  .login-wordmark {
    font-size: 24px; font-weight: 700;
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, var(--text-0) 40%, var(--text-2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .login-sub {
    text-align: center;
    font-size: 13px; color: var(--text-3);
    margin-bottom: 32px;
    letter-spacing: 0.01em;
  }
  .login-field { position: relative; margin-bottom: 24px; }
  .login-label {
    display: block;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-3);
    margin-bottom: 8px;
  }
  .login-input {
    width: 100%;
    background: var(--bg-0);
    border: 1px solid var(--border-1);
    border-radius: var(--r-md);
    color: var(--text-0);
    font-family: var(--font-mono);
    font-size: 14px;
    padding: 14px 16px;
    outline: none;
    text-align: center;
    letter-spacing: 0.08em;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .login-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }
  .login-input.error {
    border-color: var(--bear);
    box-shadow: 0 0 0 3px var(--bear-dim);
    animation: inputShake 0.4s ease;
  }
  @keyframes inputShake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .login-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), #6c5ce7);
    border: none;
    border-radius: var(--r-md);
    color: #fff;
    font-family: var(--font-body);
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: filter 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(61,139,253,0.25);
    letter-spacing: 0.02em;
  }
  .login-btn:hover { filter: brightness(1.1); box-shadow: 0 6px 24px rgba(61,139,253,0.35); }
  .login-btn:active { transform: scale(0.98); }
  .login-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .login-error {
    text-align: center;
    font-size: 12px;
    color: var(--bear);
    margin-top: 16px;
    min-height: 18px;
  }

  /* ═══════════════════════════════════════════════════════════
     HEADER
     ═══════════════════════════════════════════════════════════ */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 0 20px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border-0);
    flex-wrap: wrap; gap: 12px;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logomark {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent), #6c5ce7);
    border-radius: var(--r-sm);
    display: flex; align-items: center; justify-content: center;
    font-weight: 500; font-size: 13px; color: #fff;
    font-family: var(--font-mono);
    box-shadow: var(--logo-shadow);
    flex-shrink: 0;
  }
  .header-text h1 {
    font-size: 17px; font-weight: 700; letter-spacing: -0.03em;
    line-height: 1.2;
  }
  .header-text h1 span { color: var(--text-3); font-weight: 400; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px;
    background: var(--bg-glass);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border-1);
    border-radius: 100px;
    font-size: 11px;
    font-family: var(--font-mono);
    color: var(--text-2);
    white-space: nowrap;
  }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--bull);
    box-shadow: 0 0 8px rgba(45,212,168,0.5);
    animation: livePulse 2s ease-in-out infinite;
  }
  .live-dot.off { background: var(--bear); box-shadow: none; animation: none; }
  @keyframes livePulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .pill {
    padding: 5px 12px;
    background: transparent;
    border: 1px solid var(--border-1);
    border-radius: 100px;
    color: var(--text-2);
    font-family: var(--font-body);
    font-size: 11px; font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .pill:hover { border-color: var(--border-2); color: var(--text-1); background: var(--bg-3); }
  .pill.active { background: var(--accent-dim); border-color: rgba(61,139,253,0.3); color: var(--accent); }
  .pill-danger:hover { border-color: rgba(240,96,96,0.3); color: var(--bear); }

  /* ═══════════════════════════════════════════════════════════
     SUMMARY BAR
     ═══════════════════════════════════════════════════════════ */
  .summary-bar {
    display: flex; gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .summary-card {
    flex: 1; min-width: 150px;
    background: var(--bg-glass);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border-0);
    border-radius: var(--r-md);
    padding: 14px 18px;
    display: flex; flex-direction: column; gap: 4px;
    transition: border-color 0.2s;
  }
  .summary-card:hover { border-color: var(--border-1); }
  .summary-label {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-3);
  }
  .summary-value {
    font-family: var(--font-mono);
    font-size: 20px; font-weight: 500;
    letter-spacing: -0.02em;
  }
  .summary-sub {
    font-size: 11px; color: var(--text-3);
    font-family: var(--font-mono);
  }

  /* ═══════════════════════════════════════════════════════════
     CONTROLS
     ═══════════════════════════════════════════════════════════ */
  .controls {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .ctrl-label {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-3);
    margin-right: 2px;
  }
  .ctrl-select {
    background: var(--bg-2);
    border: 1px solid var(--border-1);
    border-radius: var(--r-sm);
    color: var(--text-1);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 5px 8px;
    outline: none; cursor: pointer;
    transition: border-color 0.2s;
  }
  .ctrl-select:focus { border-color: var(--accent); }
  .ctrl-spacer { flex: 1; }

  /* ═══════════════════════════════════════════════════════════
     GRID
     ═══════════════════════════════════════════════════════════ */
  .grid { display: grid; grid-template-columns: 1fr 360px; gap: 20px; }
  @media (max-width: 960px) { .grid { grid-template-columns: 1fr; } }

  /* ═══════════════════════════════════════════════════════════
     CARD
     ═══════════════════════════════════════════════════════════ */
  .card {
    background: var(--bg-glass);
    backdrop-filter: blur(20px) saturate(1.3);
    -webkit-backdrop-filter: blur(20px) saturate(1.3);
    border: 1px solid var(--border-0);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }
  .card-head {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-0);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-title {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-2);
  }
  .card-meta {
    font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
  }
  .card-foot {
    padding: 12px 20px;
    border-top: 1px solid var(--border-0);
    font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
    display: flex; align-items: center; gap: 8px;
  }

  /* ═══════════════════════════════════════════════════════════
     TABLE
     ═══════════════════════════════════════════════════════════ */
  .fm-table { width: 100%; border-collapse: collapse; }
  .fm-table th {
    padding: 10px 20px;
    text-align: left;
    font-size: 9px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--text-3);
    border-bottom: 1px solid var(--border-0);
    cursor: pointer; user-select: none;
    transition: color 0.2s;
    white-space: nowrap;
    position: sticky; top: 0; background: var(--bg-2); z-index: 2;
  }
  .fm-table th:hover { color: var(--text-2); }
  .fm-table th.sorted { color: var(--accent); }
  .fm-table th .arr { margin-left: 4px; font-size: 8px; opacity: 0.8; }
  .fm-table td {
    padding: 0 20px;
    height: 48px;
    font-family: var(--font-mono);
    font-size: 13px;
    border-bottom: 1px solid var(--border-0);
    white-space: nowrap;
    vertical-align: middle;
  }
  .fm-table tr { transition: background 0.15s; }
  .fm-table tbody tr:hover { background: rgba(255,255,255,0.02); }
  .fm-table tr:last-child td { border-bottom: none; }

  /* Pair cell */
  .pair-cell { display: flex; align-items: center; gap: 10px; }
  .fav-btn {
    background: none; border: none; cursor: pointer;
    font-size: 13px; line-height: 1; padding: 2px;
    color: var(--text-3); transition: all 0.15s;
    opacity: 0.4;
  }
  .fav-btn:hover { color: var(--gold); opacity: 1; }
  .fav-btn.is-fav { color: var(--gold); opacity: 1; }
  .pair-label { font-weight: 500; color: var(--text-0); letter-spacing: 0.02em; }

  /* Rank */
  .rank-chip {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: var(--r-sm);
    font-size: 11px; font-weight: 500;
    font-family: var(--font-mono);
  }
  .rank-1 { background: linear-gradient(135deg, rgba(240,185,64,0.15), rgba(240,185,64,0.05)); color: var(--gold); }
  .rank-2 { background: rgba(193,202,216,0.08); color: var(--text-2); }
  .rank-3 { background: rgba(180,130,90,0.10); color: #c4956a; }
  .rank-n { background: var(--bg-3); color: var(--text-3); }

  /* ROC value */
  .roc { font-weight: 500; display: inline-block; letter-spacing: 0.01em; }
  .roc.bull { color: var(--bull); }
  .roc.bear { color: var(--bear); }
  .roc.flash-up { animation: fUp 0.6s ease-out; }
  .roc.flash-dn { animation: fDn 0.6s ease-out; }
  @keyframes fUp {
    0% { color: #4ade80; text-shadow: 0 0 10px rgba(74,222,128,0.5); }
    100% { text-shadow: none; }
  }
  @keyframes fDn {
    0% { color: #fb923c; text-shadow: 0 0 10px rgba(251,146,60,0.5); }
    100% { text-shadow: none; }
  }

  /* Direction chip */
  .dir-chip {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border-radius: 6px;
    font-size: 10px;
  }
  .dir-chip.bull { background: var(--bull-dim); color: var(--bull); }
  .dir-chip.bear { background: var(--bear-dim); color: var(--bear); }

  /* Sparkline */
  .spark-wrap { width: 64px; height: 28px; display: inline-block; vertical-align: middle; }
  .spark-wrap svg { display: block; }

  /* Streak in table */
  .streak-val { font-family: var(--font-mono); font-size: 12px; }
  .streak-hot { color: var(--gold); font-weight: 600; }
  .streak-cold { color: var(--text-3); }

  /* ═══════════════════════════════════════════════════════════
     STREAKS SIDEBAR
     ═══════════════════════════════════════════════════════════ */
  .sk-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border-0);
    transition: background 0.15s;
  }
  .sk-row:hover { background: rgba(255,255,255,0.015); }
  .sk-row:last-child { border-bottom: none; }
  .sk-pair {
    font-family: var(--font-mono); font-size: 12px; font-weight: 500;
    width: 72px; flex-shrink: 0;
  }
  .sk-bar-bg {
    flex: 1; height: 6px;
    background: var(--bg-0);
    border-radius: 3px; overflow: hidden;
  }
  .sk-bar {
    height: 100%; border-radius: 3px;
    transition: width 0.8s cubic-bezier(0.22,1,0.36,1);
  }
  .sk-bar.bull { background: linear-gradient(90deg, var(--bull-dim), var(--bull-mid), var(--bull)); }
  .sk-bar.bear { background: linear-gradient(90deg, var(--bear-dim), var(--bear-mid), var(--bear)); }
  .sk-count {
    font-family: var(--font-mono); font-size: 11px; font-weight: 600;
    width: 36px; text-align: right; flex-shrink: 0;
  }

  /* ═══════════════════════════════════════════════════════════
     ALERTS TIMELINE
     ═══════════════════════════════════════════════════════════ */
  .tl-scroll { max-height: 340px; overflow-y: auto; }
  .tl-scroll::-webkit-scrollbar { width: 3px; }
  .tl-scroll::-webkit-scrollbar-thumb { background: var(--border-1); border-radius: 2px; }
  .tl-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border-0);
  }
  .tl-row:last-child { border-bottom: none; }
  .tl-row.new { animation: tlSlide 0.35s ease-out; }
  @keyframes tlSlide {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .tl-ts {
    font-family: var(--font-mono); font-size: 10px;
    color: var(--text-3); width: 48px; flex-shrink: 0; padding-top: 3px;
  }
  .tl-dot {
    width: 8px; height: 8px; border-radius: 50%;
    margin-top: 5px; flex-shrink: 0;
  }
  .tl-dot.bull { background: var(--bull); box-shadow: 0 0 8px rgba(45,212,168,0.4); }
  .tl-dot.bear { background: var(--bear); box-shadow: 0 0 8px rgba(240,96,96,0.4); }
  .tl-body { flex: 1; }
  .tl-pair { font-family: var(--font-mono); font-size: 13px; font-weight: 500; }
  .tl-detail { font-size: 11px; color: var(--text-3); margin-top: 2px; }

  /* ═══════════════════════════════════════════════════════════
     EMPTY / SKELETON
     ═══════════════════════════════════════════════════════════ */
  .empty {
    padding: 48px 20px; text-align: center;
    color: var(--text-3); font-size: 13px;
  }
  .empty-icon { font-size: 28px; margin-bottom: 10px; opacity: 0.35; }

  .skeleton-row {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border-0);
  }
  .skeleton-box {
    border-radius: 4px;
    background: linear-gradient(90deg, var(--skeleton-a) 25%, var(--skeleton-b) 50%, var(--skeleton-a) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.8s ease-in-out infinite;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ═══════════════════════════════════════════════════════════
     THEME TOGGLE
     ═══════════════════════════════════════════════════════════ */
  .theme-toggle {
    display: inline-flex; align-items: center;
    padding: 3px;
    background: var(--bg-2);
    border: 1px solid var(--border-1);
    border-radius: 100px;
    gap: 0;
  }
  .theme-opt {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none; background: transparent;
    color: var(--text-3);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1;
  }
  .theme-opt:hover { color: var(--text-1); }
  .theme-opt.active {
    background: var(--accent-dim);
    color: var(--accent);
    box-shadow: 0 0 8px var(--accent-dim);
  }

  /* ═══════════════════════════════════════════════════════════
     TAB BAR
     ═══════════════════════════════════════════════════════════ */
  .tab-bar {
    display: flex; align-items: center; gap: 4px;
    margin-bottom: 20px;
    padding: 4px;
    background: var(--bg-2);
    border: 1px solid var(--border-0);
    border-radius: var(--r-md);
    width: fit-content;
  }
  .tab-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    background: transparent;
    border: none;
    border-radius: var(--r-sm);
    color: var(--text-3);
    font-family: var(--font-body);
    font-size: 12px; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: 0.01em;
  }
  .tab-btn:hover { color: var(--text-1); background: var(--bg-glass-hover); }
  .tab-btn.active {
    background: var(--accent-dim);
    color: var(--accent);
    box-shadow: 0 1px 4px rgba(61,139,253,0.08);
  }
  .tab-icon { font-size: 13px; line-height: 1; }
  .tab-count {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 18px; height: 18px;
    padding: 0 5px;
    border-radius: 9px;
    font-family: var(--font-mono);
    font-size: 10px; font-weight: 500;
    background: var(--border-0);
    color: var(--text-3);
    transition: all 0.2s;
  }
  .tab-btn.active .tab-count {
    background: var(--accent-mid);
    color: var(--accent);
  }
  @media (max-width: 640px) {
    .tab-bar { width: 100%; overflow-x: auto; flex-wrap: nowrap; }
    .tab-btn { padding: 7px 12px; font-size: 11px; }
  }

  /* ═══════════════════════════════════════════════════════════
     ANIMATIONS
     ═══════════════════════════════════════════════════════════ */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fin { animation: fadeUp 0.45s cubic-bezier(0.16,1,0.3,1) both; }
  .fin-1 { animation-delay: 0.04s; }
  .fin-2 { animation-delay: 0.08s; }
  .fin-3 { animation-delay: 0.12s; }

  /* ═══════════════════════════════════════════════════════════
     RESPONSIVE
     ═══════════════════════════════════════════════════════════ */
  @media (max-width: 640px) {
    .app { padding: 12px; }
    .header h1 { font-size: 15px; }
    .summary-bar { gap: 8px; }
    .summary-card { padding: 10px 14px; min-width: 120px; }
    .summary-value { font-size: 17px; }
    .fm-table td, .fm-table th { padding-left: 14px; padding-right: 14px; }
    .spark-wrap { display: none; }
    .login-box { padding: 32px 24px; }
  }
</style>
</head>
<body>
<div class="noise"></div>
<div id="root"></div>

<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
const API_URL = 'https://fm.aideelyst.workers.dev';
let ably = null, ablyChannel = null;

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let state = {
  token: localStorage.getItem('fm_token') || '',
  loggedIn: false,
  loginError: '',
  loginLoading: false,
  latest: null,
  streaks: {},
  history: [],
  favorites: JSON.parse(localStorage.getItem('fm_favs') || '{}'),
  showN: parseInt(localStorage.getItem('fm_showN') || '10', 10),
  sortBy: 'roc',
  sortAsc: false,
  filterFav: false,
  online: false,
  lastFetch: null,
  streakTh: parseInt(localStorage.getItem('fm_th') || '5', 10),
  prevRoc: {},
  theme: localStorage.getItem('fm_theme') || 'auto',
  activeTab: localStorage.getItem('fm_tab') || 'forex'
};

// ═══════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════

// Device ID — unique per browser, persistent
function getDeviceId() {
  let id = localStorage.getItem('fm_device');
  if (!id) {
    id = 'dev_' + crypto.randomUUID().replace(/-/g, '').slice(0, 10);
    localStorage.setItem('fm_device', id);
  }
  return id;
}

function verifyUrl(token) {
  return `${API_URL}/verify?token=${encodeURIComponent(token)}&device=${encodeURIComponent(getDeviceId())}`;
}

async function login() {
  const input = document.getElementById('token-input');
  const token = input.value.trim();
  if (!token) return;
  state.loginLoading = true; state.loginError = ''; render();
  try {
    const res = await fetch(verifyUrl(token), { cache: 'no-store' });
    const data = await res.json();
    if (data.valid) {
      state.token = token; state.loggedIn = true; state.loginLoading = false;
      localStorage.setItem('fm_token', token);
      render(); await fetchData(); await connectRealtime();
    } else {
      if (data.error === 'device limit reached') {
        state.loginError = 'Token sudah dipakai di device lain.';
      } else if (data.error === 'token expired' || data.error === 'invalid or expired token') {
        state.loginError = 'Token expired — streak lagi untuk dapat baru.';
      } else {
        state.loginError = 'Invalid token.';
      }
      state.loginLoading = false; render();
      const el = document.getElementById('token-input');
      if (el) { el.classList.add('error'); setTimeout(() => el.classList.remove('error'), 1200); }
    }
  } catch (e) {
    state.loginError = 'Connection failed. Try again.'; state.loginLoading = false; render();
  }
}

function logout() {
  closeRealtime();
  Object.assign(state, { token:'', loggedIn:false, latest:null, streaks:{}, history:[], online:false, lastFetch:null, prevRoc:{} });
  localStorage.removeItem('fm_token'); render();
}

async function checkToken() {
  if (!state.token) return;
  try {
    const res = await fetch(verifyUrl(state.token), { cache: 'no-store' });
    const data = await res.json();
    if (data.valid) { state.loggedIn = true; render(); await fetchData(); await connectRealtime(); }
    else { localStorage.removeItem('fm_token'); state.token = ''; render(); }
  } catch (e) { render(); }
}

// ═══════════════════════════════════════════════════════════
// ABLY REALTIME
// ═══════════════════════════════════════════════════════════
function closeRealtime() {
  try { if (ablyChannel) { ablyChannel.unsubscribe(); ablyChannel = null; } if (ably) { ably.close(); ably = null; } } catch(e){}
}

async function connectRealtime() {
  if (!state.token || !state.loggedIn || !window.Ably) return;
  closeRealtime();
  ably = new Ably.Realtime.Promise({ authUrl: `${API_URL}/ably/token?token=${encodeURIComponent(state.token)}` });
  const setOnline = v => { state.online = v; updateDashboard(); };
  ably.connection.on('connected', () => { state.online = true; state.lastFetch = Date.now(); updateDashboard(); });
  ['connecting','disconnected','suspended','failed'].forEach(e => ably.connection.on(e, () => setOnline(false)));
  ablyChannel = ably.channels.get('flow-monitor');
  await ablyChannel.subscribe('snapshot', msg => {
    const d = msg.data || {};
    if (state.latest?.pairs) { const p = {}; for (const x of state.latest.pairs) p[x.p] = x.r; state.prevRoc = p; }
    if (d.latest) {
      state.latest = d.latest;
      const lt = state.history.length ? state.history[state.history.length-1]?.t : null;
      if (!lt || lt !== d.latest.t) { state.history.push(d.latest); if (state.history.length > 50) state.history = state.history.slice(-50); }
      else state.history[state.history.length-1] = d.latest;
    }
    if (d.streaks) state.streaks = d.streaks;
    state.online = true; state.lastFetch = Date.now(); updateDashboard();
  });
}

// ═══════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════
async function fetchData() {
  if (!state.token || !state.loggedIn) return;
  try {
    const [lr, hr] = await Promise.all([
      fetch(`${API_URL}/fm?token=${encodeURIComponent(state.token)}&t=${Date.now()}`, { cache:'no-store' }),
      fetch(`${API_URL}/fm/history?token=${encodeURIComponent(state.token)}&t=${Date.now()}`, { cache:'no-store' })
    ]);
    if (lr.status === 401 || hr.status === 401) { logout(); return; }
    const ld = await lr.json(), hd = await hr.json();
    if (state.latest?.pairs) { const p = {}; for (const x of state.latest.pairs) p[x.p] = x.r; state.prevRoc = p; }
    state.latest = ld.latest; state.streaks = ld.streaks || {};
    state.history = Array.isArray(hd) ? hd : [];
    state.online = true; state.lastFetch = Date.now(); updateDashboard();
  } catch(e) { state.online = false; updateDashboard(); }
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function fmtTime(ts) {
  if (!ts) return '--:--';
  return new Date(ts).toLocaleTimeString('en-GB', { timeZone:'Asia/Jakarta', hour:'2-digit', minute:'2-digit' });
}
function fmtDT(ts) {
  if (!ts) return '--';
  return new Date(ts).toLocaleString('en-GB', { timeZone:'Asia/Jakarta', day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit' });
}
function ago(ts) {
  if (!ts) return '';
  const s = Math.floor((Date.now()-ts)/1000);
  if (s<60) return s+'s ago';
  if (s<3600) return Math.floor(s/60)+'m ago';
  return Math.floor(s/3600)+'h ago';
}
function rankCls(r) { return r===1?'rank-1':r===2?'rank-2':r===3?'rank-3':'rank-n'; }
function sortArrow(col) { return state.sortBy!==col?'':`<span class="arr">${state.sortAsc?'↑':'↓'}</span>`; }

// ── Asset classification ──
const CRYPTO_BASES = ['BTC','ETH','SOL','XRP','ADA','DOGE','BNB','DOT','AVAX','LINK','MATIC','POL','LTC','SHIB','UNI','ATOM','APT','SUI','TON','NEAR','FTM','OP','ARB','INJ','TIA','PEPE','WIF','BONK','RENDER','FET','TAO'];
const COMMODITY_PFX = ['XAU','XAG','XPT','XPD'];
const COMMODITY_KW = ['OIL','WTI','BRENT','NATGAS','NGAS','COPPER','COCOA','COFFEE','SUGAR','WHEAT','CORN','SOYBEAN','COTTON','LUMBER','PALLADIUM','PLATINUM'];
const INDEX_KW = ['US30','US500','US100','US2000','NAS100','NDX','SPX','DJI','DAX','GER40','GER30','UK100','FTSE','JP225','NI225','AUS200','FRA40','CAC40','EU50','STOXX','HSI','CHINA','HK50','VIX','RUSSELL'];
const FOREX_CCYS = ['EUR','USD','GBP','JPY','AUD','NZD','CAD','CHF'];

function classifyPair(name) {
  const u = name.toUpperCase().replace(/[^A-Z0-9]/g, '');
  // Index
  for (const kw of INDEX_KW) if (u.includes(kw)) return 'indices';
  // Commodity
  for (const pfx of COMMODITY_PFX) if (u.startsWith(pfx)) return 'commodities';
  for (const kw of COMMODITY_KW) if (u.includes(kw)) return 'commodities';
  // Crypto
  for (const base of CRYPTO_BASES) {
    if (u.startsWith(base) || u.endsWith(base)) return 'crypto';
  }
  // Forex: check if pair is made of two known currency codes
  const base3 = u.slice(0, 3);
  const quote3 = u.slice(3, 6);
  if (FOREX_CCYS.includes(base3) && FOREX_CCYS.includes(quote3)) return 'forex';
  // Fallback: if nothing matched, put in forex
  return 'forex';
}

// Tab metadata
const TABS = [
  { id: 'forex',       label: 'Forex',       icon: '💱' },
  { id: 'commodities', label: 'Commodities', icon: '🥇' },
  { id: 'crypto',      label: 'Crypto',      icon: '₿'  },
  { id: 'indices',     label: 'Indices',     icon: '📊' },
];

function pairsForTab(tab) {
  if (!state.latest?.pairs) return [];
  return state.latest.pairs.filter(p => classifyPair(p.p) === tab);
}

function tabCounts() {
  const c = { forex:0, commodities:0, crypto:0, indices:0 };
  if (!state.latest?.pairs) return c;
  for (const p of state.latest.pairs) c[classifyPair(p.p)]++;
  return c;
}

function getSortedPairs() {
  if (!state.latest?.pairs) return [];
  // Filter by active tab
  let p = state.latest.pairs
    .filter(x => classifyPair(x.p) === state.activeTab)
    .map((x,i) => ({...x, rank:i+1}));
  if (state.filterFav) p = p.filter(x => state.favorites[x.p]);
  if (state.sortBy==='name') p.sort((a,b) => state.sortAsc?a.p.localeCompare(b.p):b.p.localeCompare(a.p));
  else if (state.sortBy==='streak') p.sort((a,b) => { const sa=state.streaks[a.p]||0, sb=state.streaks[b.p]||0; return state.sortAsc?sa-sb:sb-sa; });
  else p.sort((a,b) => state.sortAsc?Math.abs(a.r)-Math.abs(b.r):Math.abs(b.r)-Math.abs(a.r));
  return p.slice(0, state.showN);
}
function getSortedStreaks() {
  return Object.entries(state.streaks)
    .filter(([pair]) => classifyPair(pair) === state.activeTab)
    .map(([pair,count]) => ({pair,count,roc:state.latest?.pairs?.find(p=>p.p===pair)?.r||0}))
    .sort((a,b) => b.count-a.count).slice(0,10);
}
function getAlerts() {
  const alerts=[], seen={};
  for (const snap of state.history.slice(-20).reverse()) {
    if (!snap.pairs) continue;
    for (const p of snap.pairs) {
      if (classifyPair(p.p) !== state.activeTab) continue;
      const s=state.streaks[p.p]||0;
      if (s>=state.streakTh && !seen[p.p]) { alerts.push({pair:p.p,roc:p.r,streak:s,t:snap.t}); seen[p.p]=true; }
    }
  }
  return alerts.slice(0,10);
}
function flashCls(pair,roc) {
  const prev=state.prevRoc[pair];
  if (prev===undefined) return '';
  if (Math.abs(roc)>Math.abs(prev)+0.01) return 'flash-up';
  if (Math.abs(roc)<Math.abs(prev)-0.01) return 'flash-dn';
  return '';
}

// Build sparkline SVG from history for a given pair
function sparkSVG(pair) {
  const vals = [];
  for (const snap of state.history.slice(-12)) {
    const found = snap.pairs?.find(p => p.p === pair);
    if (found) vals.push(found.r);
  }
  if (vals.length < 2) return '';
  const w=64, h=28, pad=2;
  const min=Math.min(...vals), max=Math.max(...vals);
  const range = max-min || 0.01;
  const pts = vals.map((v,i) => {
    const x = pad + (i/(vals.length-1)) * (w-pad*2);
    const y = pad + (1 - (v-min)/range) * (h-pad*2);
    return `${x},${y}`;
  });
  const last = vals[vals.length-1];
  const col = last >= 0 ? 'var(--bull)' : 'var(--bear)';
  const colDim = last >= 0 ? 'var(--bull-dim)' : 'var(--bear-dim)';
  // gradient fill
  const firstPt = pts[0];
  const lastPt = pts[pts.length-1];
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="sg_${pair}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${col}" stop-opacity="0.15"/>
        <stop offset="100%" stop-color="${col}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <polygon points="${pts.join(' ')} ${w-pad},${h-pad} ${pad},${h-pad}" fill="url(#sg_${pair})" />
    <polyline points="${pts.join(' ')}" stroke="${col}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
    <circle cx="${lastPt.split(',')[0]}" cy="${lastPt.split(',')[1]}" r="2" fill="${col}"/>
  </svg>`;
}

// Summary stats
function getSummary() {
  if (!state.latest?.pairs?.length) return null;
  const pairs = state.latest.pairs.filter(p => classifyPair(p.p) === state.activeTab);
  if (!pairs.length) return null;
  const bulls = pairs.filter(p => p.r > 0).length;
  const strongest = [...pairs].sort((a,b) => Math.abs(b.r)-Math.abs(a.r))[0];
  const avgMom = pairs.reduce((s,p) => s+Math.abs(p.r), 0) / pairs.length;
  const activeStreaks = Object.entries(state.streaks)
    .filter(([k]) => classifyPair(k) === state.activeTab)
    .filter(([,v]) => v >= state.streakTh).length;
  return { total: pairs.length, bulls, bears: pairs.length-bulls, strongest, avgMom, activeStreaks };
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function render() {
  const root = document.getElementById('root');
  if (!state.loggedIn) { root.innerHTML = renderLogin(); syncThemeToggle(); return; }
  if (!document.getElementById('app-shell')) renderShell();
  syncThemeToggle();
  updateDashboard();
}

function renderLogin() {
  return `
    <div class="login-wrap">
      <div class="login-backdrop"></div>
      <div class="login-box">
        <div style="position:absolute;top:16px;right:16px">
          <div class="theme-toggle" id="login-theme-toggle">
            <button class="theme-opt" data-theme="light" onclick="setTheme('light')" title="Light">☀</button>
            <button class="theme-opt" data-theme="auto" onclick="setTheme('auto')" title="System">◐</button>
            <button class="theme-opt" data-theme="dark" onclick="setTheme('dark')" title="Dark">☾</button>
          </div>
        </div>
        <div class="login-brand">
          <div class="login-logomark">FM</div>
          <div class="login-wordmark">Flow Monitor</div>
        </div>
        <div class="login-sub">Real-time currency strength analytics</div>
        <div class="login-field">
          <label class="login-label">Access Token</label>
          <input class="login-input" id="token-input" type="text" placeholder="xxxx-xxxx-xxxx"
            onkeydown="if(event.key==='Enter')login()"
            ${state.loginLoading?'disabled':''} autocomplete="off" spellcheck="false">
        </div>
        <button class="login-btn" onclick="login()" ${state.loginLoading?'disabled':''}>
          ${state.loginLoading?'Verifying...':'Connect'}
        </button>
        <div class="login-error">${state.loginError}</div>
      </div>
    </div>`;
}

function renderShell() {
  document.getElementById('root').innerHTML = `
    <div class="app" id="app-shell">
      <header class="header">
        <div class="header-left">
          <div class="logomark">FM</div>
          <div class="header-text"><h1>Flow Monitor <span id="header-ctx">· Forex</span></h1></div>
        </div>
        <div class="header-right">
          <div class="badge"><div id="live-dot" class="live-dot off"></div><span id="live-txt">Offline</span></div>
          <div class="theme-toggle" id="theme-toggle">
            <button class="theme-opt" data-theme="light" onclick="setTheme('light')" title="Light">☀</button>
            <button class="theme-opt" data-theme="auto" onclick="setTheme('auto')" title="System">◐</button>
            <button class="theme-opt" data-theme="dark" onclick="setTheme('dark')" title="Dark">☾</button>
          </div>
          <button class="pill" id="fav-pill" onclick="toggleFav()">★ Favorites</button>
          <button class="pill pill-danger" onclick="logout()">Logout</button>
        </div>
      </header>

      <div class="tab-bar" id="tab-bar">
        ${TABS.map(t => `
          <button class="tab-btn ${state.activeTab===t.id?'active':''}" data-tab="${t.id}" onclick="setTab('${t.id}')">
            <span class="tab-icon">${t.icon}</span>
            ${t.label}
            <span class="tab-count" id="tc-${t.id}">0</span>
          </button>
        `).join('')}
      </div>

      <div id="summary-bar" class="summary-bar"></div>

      <div class="controls">
        <span class="ctrl-label">Show</span>
        <select class="ctrl-select" id="showN" onchange="setShowN(this.value)">
          ${[5,10,15,20,28].map(n=>`<option value="${n}" ${state.showN===n?'selected':''}>${n===28?'All':'Top '+n}</option>`).join('')}
        </select>
        <span class="ctrl-label" style="margin-left:10px">Streak ≥</span>
        <select class="ctrl-select" id="thSel" onchange="setStreakTh(this.value)">
          ${[3,4,5,6,8,10].map(n=>`<option value="${n}" ${state.streakTh===n?'selected':''}>${n}</option>`).join('')}
        </select>
        <div class="ctrl-spacer"></div>
        <span class="ctrl-label">Sort</span>
        <button class="pill" id="s-roc" onclick="setSort('roc')">|ROC|</button>
        <button class="pill" id="s-name" onclick="setSort('name')">A→Z</button>
        <button class="pill" id="s-streak" onclick="setSort('streak')">Streak</button>
      </div>

      <div class="grid">
        <div>
          <div class="card">
            <div class="card-head">
              <div class="card-title">Momentum Rankings</div>
              <div class="card-meta" id="pair-ct">—</div>
            </div>
            <div id="table-body"></div>
            <div class="card-foot" id="card-foot">📡 Waiting...</div>
          </div>
        </div>
        <div>
          <div class="card" style="margin-bottom:16px">
            <div class="card-head">
              <div class="card-title">Active Streaks</div>
              <div class="card-meta" id="th-label">th:${state.streakTh}</div>
            </div>
            <div id="streaks-body"></div>
          </div>
          <div class="card">
            <div class="card-head">
              <div class="card-title">Streak Alerts</div>
            </div>
            <div class="tl-scroll" id="alerts-body"></div>
          </div>
        </div>
      </div>
    </div>`;
}

// ── Dashboard update ──
function updateDashboard() {
  if (!state.loggedIn || !document.getElementById('app-shell')) return;
  const pairs = getSortedPairs();
  const streaks = getSortedStreaks();
  const alerts = getAlerts();
  const maxSk = Math.max(state.streakTh*2, ...streaks.map(s=>s.count), 1);

  // Header
  const ld = document.getElementById('live-dot');
  const lt = document.getElementById('live-txt');
  if (ld) ld.className = `live-dot ${state.online?'':'off'}`;
  if (lt) lt.textContent = state.online?'Live':'Offline';
  const fp = document.getElementById('fav-pill');
  if (fp) fp.classList.toggle('active', state.filterFav);
  ['roc','name','streak'].forEach(k => {
    const b = document.getElementById('s-'+k);
    if (b) b.classList.toggle('active', state.sortBy===k);
  });
  const pc = document.getElementById('pair-ct');
  if (pc) pc.textContent = state.latest ? pairs.length+' pairs' : '—';
  const thl = document.getElementById('th-label');
  if (thl) thl.textContent = 'th:'+state.streakTh;

  // Tab counts
  const counts = tabCounts();
  for (const t of TABS) {
    const el = document.getElementById('tc-'+t.id);
    if (el) el.textContent = counts[t.id];
  }
  // Header context
  const ctx = document.getElementById('header-ctx');
  const meta = TABS.find(t => t.id === state.activeTab);
  if (ctx && meta) ctx.textContent = '· ' + meta.label;

  // Summary bar
  renderSummary();

  // Table
  renderTable(pairs);

  // Streaks
  renderStreaks(streaks, maxSk);

  // Alerts
  renderAlerts(alerts);

  // Footer
  const cf = document.getElementById('card-foot');
  if (cf) {
    cf.innerHTML = state.lastFetch
      ? `📡 ${fmtDT(state.lastFetch)} WIB <span style="margin-left:4px;opacity:0.5">· ${ago(state.lastFetch)}</span>`
      : '📡 Waiting for data...';
  }
}

function renderSummary() {
  const el = document.getElementById('summary-bar');
  if (!el) return;
  const s = getSummary();
  if (!s) {
    el.innerHTML = [1,2,3,4].map(() => `
      <div class="summary-card">
        <div class="skeleton-box" style="width:60px;height:10px;margin-bottom:8px"></div>
        <div class="skeleton-box" style="width:48px;height:22px"></div>
      </div>`).join('');
    return;
  }
  el.innerHTML = `
    <div class="summary-card fin fin-1">
      <div class="summary-label">Pairs tracked</div>
      <div class="summary-value">${s.total}</div>
      <div class="summary-sub" style="color:var(--bull)">${s.bulls} bull</span> · <span style="color:var(--bear)">${s.bears} bear</span></div>
    </div>
    <div class="summary-card fin fin-1">
      <div class="summary-label">Strongest</div>
      <div class="summary-value" style="color:${s.strongest.r>0?'var(--bull)':'var(--bear)'}">
        ${s.strongest.r>0?'+':''}${s.strongest.r.toFixed(2)}%
      </div>
      <div class="summary-sub">${s.strongest.p}</div>
    </div>
    <div class="summary-card fin fin-2">
      <div class="summary-label">Avg |Momentum|</div>
      <div class="summary-value">${s.avgMom.toFixed(2)}%</div>
    </div>
    <div class="summary-card fin fin-3">
      <div class="summary-label">Active streaks</div>
      <div class="summary-value" style="color:${s.activeStreaks?'var(--gold)':'var(--text-3)'}">${s.activeStreaks}</div>
      <div class="summary-sub">≥ ${state.streakTh} threshold</div>
    </div>`;
}

function renderTable(pairs) {
  const el = document.getElementById('table-body');
  if (!el) return;
  if (!state.latest) {
    el.innerHTML = Array(6).fill(0).map(() => `
      <div class="skeleton-row">
        <div class="skeleton-box" style="width:26px;height:26px;border-radius:6px"></div>
        <div class="skeleton-box" style="width:72px;height:14px;flex-shrink:0"></div>
        <div style="flex:1"></div>
        <div class="skeleton-box" style="width:56px;height:14px"></div>
        <div class="skeleton-box" style="width:64px;height:24px;border-radius:4px"></div>
        <div class="skeleton-box" style="width:32px;height:14px"></div>
      </div>`).join('');
    return;
  }
  if (!pairs.length) {
    const tabMeta = TABS.find(t => t.id === state.activeTab);
    const tabLabel = tabMeta ? tabMeta.label : state.activeTab;
    const hasAnyData = state.latest?.pairs?.length > 0;
    const emptyMsg = hasAnyData
      ? `No ${tabLabel} pairs in current data — add them to your Pine Script indicator`
      : 'No data — waiting for Pine Script push';
    el.innerHTML = `<div class="empty"><div class="empty-icon">${hasAnyData ? '🔍' : '📡'}</div>${emptyMsg}</div>`;
    return;
  }
  el.innerHTML = `<table class="fm-table"><thead><tr>
    <th style="width:38px">#</th>
    <th onclick="setSort('name')" class="${state.sortBy==='name'?'sorted':''}">Pair${sortArrow('name')}</th>
    <th style="width:72px">Chart</th>
    <th onclick="setSort('roc')" class="${state.sortBy==='roc'?'sorted':''}" style="text-align:right">ROC %${sortArrow('roc')}</th>
    <th style="width:36px"></th>
    <th onclick="setSort('streak')" class="${state.sortBy==='streak'?'sorted':''}" style="text-align:right">Streak${sortArrow('streak')}</th>
  </tr></thead><tbody>${pairs.map(p => {
    const bull = p.r>0;
    const sk = state.streaks[p.p]||0;
    const isFav = state.favorites[p.p];
    const hit = sk>=state.streakTh;
    const fl = flashCls(p.p, p.r);
    return `<tr>
      <td><span class="rank-chip ${rankCls(p.rank)}">${p.rank}</span></td>
      <td><div class="pair-cell">
        <button class="fav-btn ${isFav?'is-fav':''}" onclick="togglePairFav('${p.p}')">${isFav?'★':'☆'}</button>
        <span class="pair-label">${p.p}</span>
      </div></td>
      <td><div class="spark-wrap">${sparkSVG(p.p)}</div></td>
      <td style="text-align:right"><span class="roc ${bull?'bull':'bear'} ${fl}">${bull?'+':''}${p.r.toFixed(2)}%</span></td>
      <td><span class="dir-chip ${bull?'bull':'bear'}">${bull?'▲':'▼'}</span></td>
      <td style="text-align:right"><span class="streak-val ${hit?'streak-hot':'streak-cold'}">${sk>0?sk+'×':'—'}</span></td>
    </tr>`;
  }).join('')}</tbody></table>`;
}

function renderStreaks(list, max) {
  const el = document.getElementById('streaks-body');
  if (!el) return;
  if (!list.length) { el.innerHTML = `<div class="empty"><div class="empty-icon">⏳</div>No active streaks</div>`; return; }
  el.innerHTML = list.map(s => {
    const bull = s.roc>0;
    const pct = Math.min((s.count/max)*100, 100);
    const hit = s.count>=state.streakTh;
    return `<div class="sk-row">
      <div class="sk-pair" style="color:${bull?'var(--bull)':'var(--bear)'}">${s.pair}</div>
      <div class="sk-bar-bg"><div class="sk-bar ${bull?'bull':'bear'}" style="width:${pct}%"></div></div>
      <div class="sk-count" style="color:${hit?'var(--gold)':'var(--text-2)'}">${s.count}×</div>
    </div>`;
  }).join('');
}

function renderAlerts(alerts) {
  const el = document.getElementById('alerts-body');
  if (!el) return;
  if (!alerts.length) { el.innerHTML = `<div class="empty"><div class="empty-icon">🔔</div>No alerts yet</div>`; return; }
  el.innerHTML = alerts.map(a => {
    const bull = a.roc>0;
    return `<div class="tl-row">
      <div class="tl-ts">${fmtTime(a.t)}</div>
      <div class="tl-dot ${bull?'bull':'bear'}"></div>
      <div class="tl-body">
        <div class="tl-pair" style="color:${bull?'var(--bull)':'var(--bear)'}">
          ${bull?'▲':'▼'} ${a.pair}
        </div>
        <div class="tl-detail">${a.streak}× streak · ${bull?'+':''}${a.roc.toFixed(2)}%</div>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════
function setTab(tab) {
  state.activeTab = tab;
  localStorage.setItem('fm_tab', tab);
  // Update tab buttons
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('data-tab') === tab);
  });
  // Update header context
  const ctx = document.getElementById('header-ctx');
  const meta = TABS.find(t => t.id === tab);
  if (ctx && meta) ctx.textContent = '· ' + meta.label;
  updateDashboard();
}

function setTheme(t) {
  state.theme = t;
  localStorage.setItem('fm_theme', t);
  applyTheme();
  syncThemeToggle();
}
function applyTheme() {
  document.documentElement.setAttribute('data-theme', state.theme);
}
function syncThemeToggle() {
  document.querySelectorAll('.theme-toggle').forEach(wrap => {
    wrap.querySelectorAll('.theme-opt').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-theme') === state.theme);
    });
  });
}

function setSort(col) {
  if (state.sortBy===col) state.sortAsc=!state.sortAsc;
  else { state.sortBy=col; state.sortAsc=col==='name'; }
  updateDashboard();
}
function setShowN(v) { state.showN=parseInt(v,10); localStorage.setItem('fm_showN',v); updateDashboard(); }
function setStreakTh(v) { state.streakTh=parseInt(v,10); localStorage.setItem('fm_th',v); updateDashboard(); }
function toggleFav() { state.filterFav=!state.filterFav; updateDashboard(); }
function togglePairFav(p) { state.favorites[p]?delete state.favorites[p]:state.favorites[p]=true; localStorage.setItem('fm_favs',JSON.stringify(state.favorites)); updateDashboard(); }

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
// INIT
applyTheme();
render();
checkToken();
setInterval(() => { if (state.loggedIn) { const cf=document.getElementById('card-foot'); if (cf&&state.lastFetch) cf.innerHTML=`📡 ${fmtDT(state.lastFetch)} WIB <span style="margin-left:4px;opacity:0.5">· ${ago(state.lastFetch)}</span>`; }}, 1000);
</script>
</body>
</html>
